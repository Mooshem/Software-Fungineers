name: "godot-ci export"
on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.1
  EXPORT_NAME: Coding Cubed
  PROJECT_PATH: ./coding-cubed
  ITCH_USERNAME: tehlamo
  ITCH_GAME_ID: tehlamo/coding-cubed

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(pwd)/build"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows
      - name: Upload to itch.io
        run: |
          wget -O butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler push build/windows ${{ env.ITCH_GAME_ID }}:windows
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

  export-mac:
    name: Mac Export
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          brew install --cask godot
          godot --headless --editor --quit || true
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates"
          curl -L https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz -o templates.tpz
          unzip templates.tpz
          mv templates "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
      - name: Mac Build
        run: |
          mkdir -v -p build/mac
          EXPORT_DIR="$(pwd)/build"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Mac" "$EXPORT_DIR/mac/$EXPORT_NAME.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: build/mac
      - name: Upload to itch.io
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/darwin-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler push build/mac ${{ env.ITCH_GAME_ID }}:mac
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
